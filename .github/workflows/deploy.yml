name: Web Check (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "web/**"
  workflow_dispatch:

jobs:
  web-check:
    name: lint + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: ./web
        run: npm ci

      - name: Lint
        working-directory: ./web
        run: npm run lint

      - name: Typecheck
        working-directory: ./web
        run: npm run typecheck
